name: Run Tests

on:
    push:
        branches: [main, phase-3]
    pull_request:
        branches: [main, phase-3]

jobs:
    backend-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5

            - name: Install backend dependencies
              run: npm ci
              working-directory: ./backend

            - name: Run tests
              run: npm test
              working-directory: ./backend

    frontend-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5

            - name: Install backend dependencies
              run: npm ci
              working-directory: ./backend

            - name: Start backend server
              run: npm start > /tmp/backend.log 2>&1 &
              working-directory: ./backend

            - name: Wait for the backend to be ready
              run: |
                  for i in {1..3}; do
                    if curl -s http://localhost:3000/health; then
                      echo "Backend is ready"
                      exit 0
                    fi
                    echo "Waiting for backend... (attempt $i/3)"
                    sleep 1
                  done
                  echo "Backend failed to start"
                  exit 1

            - name: Install frontend dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Run Cypress tests (unit & e2e)
              run: npm test
              working-directory: ./frontend
